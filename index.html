<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>VibeTracker</title>
    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #080a0d;
        color: #eef1f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei UI", sans-serif;
      }

      #root {
        min-height: 100vh;
      }

      #vibetracker-boot {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 20% 0%, rgba(116, 169, 255, 0.14), transparent 32%),
          linear-gradient(180deg, #101318, #080a0d 58%);
      }

      .vibetracker-boot-card {
        width: min(520px, 100%);
        padding: 28px;
        border: 1px solid #252b34;
        border-radius: 16px;
        background: rgba(17, 21, 26, 0.94);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      }

      .vibetracker-boot-mark {
        width: 40px;
        height: 40px;
        display: grid;
        place-items: center;
        border-radius: 11px;
        background: #eef1f5;
        color: #080a0d;
        font-weight: 700;
      }

      .vibetracker-boot-card h1 {
        margin: 20px 0 0;
        font-size: 22px;
      }

      .vibetracker-boot-card p {
        margin: 10px 0 0;
        color: #a8b0bd;
        font-size: 14px;
        line-height: 1.7;
      }

      .vibetracker-boot-hint {
        padding-top: 14px;
        border-top: 1px solid #252b34;
      }

      @media (prefers-reduced-motion: no-preference) {
        .vibetracker-boot-mark {
          animation: vibetracker-boot-pulse 1.6s ease-in-out infinite;
        }
      }

      @keyframes vibetracker-boot-pulse {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <section id="vibetracker-boot" role="status" aria-live="polite" aria-labelledby="vibetracker-boot-title">
      <div class="vibetracker-boot-card">
        <div class="vibetracker-boot-mark" aria-hidden="true">V</div>
        <h1 id="vibetracker-boot-title">VibeTracker 正在启动</h1>
        <p>正在连接本地项目中枢与安全存储，请稍候。</p>
        <p class="vibetracker-boot-hint">如果此页面长时间没有消失，请重新启动应用；启动态会保留，避免只显示空白窗口。</p>
        <noscript><p>当前环境未启用 JavaScript，VibeTracker 无法启动。</p></noscript>
      </div>
    </section>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
